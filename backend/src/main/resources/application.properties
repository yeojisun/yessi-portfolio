spring.application.name=portfolio-backend

# Server Configuration
server.port=${PORT:8085}

# Database Configuration (Defaults to H2, overridable on Render via env variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/portfolio;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA & Hibernate Settings
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (Access at http://localhost:8085/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
